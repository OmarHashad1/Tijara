      security: [{ cookieAuth: [] }]
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, minimum: 1 } }
        - { name: size, in: query, schema: { type: integer, minimum: 1 } }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Coupon - Admin]
      operationId: createCoupon
      summary: Create a coupon
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCouponDto" }
      responses:
        "201": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /admin/coupons/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    patch:
      tags: [Coupon - Admin]
      operationId: updateCoupon
      summary: Update a coupon
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCouponDto" }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Coupon - Admin]
      operationId: deleteCoupon
      summary: Delete a coupon
      security: [{ cookieAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ---------------- Order - Customer ----------------
  /orders:
    post:
      tags: [Order - Customer]
      operationId: checkout
      summary: Check out the cart into an order
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CheckoutDto" }
      responses:
        "201": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    get:
      tags: [Order - Customer]
      operationId: listOwnOrders
      summary: List current user's orders
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: status, in: query, schema: { $ref: "#/components/schemas/ORDER_STATUS" } }
        - { name: page, in: query, schema: { type: integer, minimum: 1 } }
        - { name: size, in: query, schema: { type: integer, minimum: 1 } }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /orders/{id}:
    get:
      tags: [Order - Customer]
      operationId: getOwnOrder
      summary: Get one of current user's orders
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /orders/{id}/cancel:
    patch:
      tags: [Order - Customer]
      operationId: cancelOrder
      summary: Cancel an order
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /orders/webhook:
    post:
      tags: [Order - Customer]
      operationId: paymentWebhook
      summary: Payment provider webhook callback (e.g. Stripe). Public, no auth.
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200":
          description: Webhook acknowledged
        "400": { $ref: "#/components/responses/BadRequest" }

  # ---------------- Order - Admin ----------------
  /admin/orders:
    get:
      tags: [Order - Admin]
      operationId: adminListOrders
      summary: List all orders (filter by status/userId, paginated)
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: status, in: query, schema: { $ref: "#/components/schemas/ORDER_STATUS" } }
        - { name: userId, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, minimum: 1 } }
        - { name: size, in: query, schema: { type: integer, minimum: 1 } }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /admin/orders/{id}:
    get:
      tags: [Order - Admin]
      operationId: adminGetOrder
      summary: Get a single order by id
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /admin/orders/{id}/status:
    patch:
      tags: [Order - Admin]
      operationId: adminUpdateOrderStatus
      summary: Update order status
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateOrderStatusDto" }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ---------------- Review - Guest ----------------
  /products/{productId}/reviews:
    parameters:
      - { name: productId, in: path, required: true, schema: { type: string } }
    get:
      tags: [Review - Guest]
      operationId: listProductReviews
      summary: List reviews for a product (paginated)
      parameters:
        - { name: page, in: query, schema: { type: integer, minimum: 1 } }
        - { name: size, in: query, schema: { type: integer, minimum: 1 } }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [Review - Customer]
      operationId: createReview
      summary: Submit a review for a product (requires a completed order)
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateReviewDto" }
      responses:
        "201": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ---------------- Review - Customer ----------------
  /reviews/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    patch:
      tags: [Review - Customer]
      operationId: updateReview
      summary: Update own review
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateReviewDto" }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Review - Customer]
      operationId: deleteOwnReview
      summary: Delete own review
      security: [{ cookieAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ---------------- Review - Admin ----------------
  /admin/reviews:
    get:
      tags: [Review - Admin]
      operationId: adminListReviews
      summary: List all reviews (filter by product/user/rating, paginated)
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: productId, in: query, schema: { type: string } }
        - { name: userId, in: query, schema: { type: string } }
        - { name: rating, in: query, schema: { type: integer, minimum: 1, maximum: 5 } }
        - { name: page, in: query, schema: { type: integer, minimum: 1 } }
        - { name: size, in: query, schema: { type: integer, minimum: 1 } }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /admin/reviews/{id}:
    delete:
      tags: [Review - Admin]
      operationId: adminDeleteReview
      summary: Delete any review
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken
      description: Set by POST /auth/login. Required for all protected routes.
    refreshCookieAuth:
      type: apiKey
      in: cookie
      name: refreshToken
      description: Set by POST /auth/login. Used only by POST /auth/refresh-token.

  responses:
    MessageOk:
      description: Success
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MessageResponse" }
    MessageDataOk:
      description: Success
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MessageDataResponse" }
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Unauthorized:
      description: Missing/invalid/expired auth cookie
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Forbidden:
      description: Authenticated but role not permitted, or email not verified
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

  schemas:
    ErrorResponse:
      type: object
      properties:
        statusCode: { type: integer, example: 400 }
        message: { type: string }
        error: { type: string }

    MessageResponse:
      type: object
      properties:
        message: { type: string }
        payload: { type: object, additionalProperties: true }

    MessageDataResponse:
      type: object
      properties:
        message: { type: string }
        data: { type: object, additionalProperties: true }

    # ---- Enums ----
    ROLE:
      type: string
      enum: [user, admin]
    USER_STATUS:
      type: string
      enum: [active, deativated, BANNED]
      description: "'deativated' is a typo preserved verbatim from the source enum"
    PAYMENT_METHOD:
      type: string
      enum: [card, POD]
    ORDER_STATUS:
      type: string
      enum: [pending, shipped, confirmed, delivered, cancelled]
    PAYMENT_PROVIDER:
      type: string
      enum: [stripe, cash_on_delivery]
    DISCOUNT_TYPE:
      type: string
      enum: [percent, fixed]
    LOGOUT_TYPE:
      type: string
      enum: [all, device]

    # ---- Auth DTOs ----
    LoginDto:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    SignupDto:
      type: object
      required: [firstName, lastName, email, password]
      properties:
        firstName: { type: string, minLength: 3, maxLength: 16 }
        lastName: { type: string, minLength: 3, maxLength: 16 }
        email: { type: string, format: email }
        password:
          type: string
          minLength: 8
          description: Must include at least 1 number, 1 symbol, 1 uppercase letter
        phoneNumber: { type: string }

    ForgotPasswordOtp:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    ForgotPassword:
      type: object
      required: [email, newPassword]
      properties:
        email: { type: string, format: email }
        newPassword:
          type: string
          minLength: 8
          description: Must include at least 1 number, 1 symbol, 1 uppercase letter

    VerifyForgotPasswordOtp:
      type: object
      required: [email, otp]
      properties:
        email: { type: string, format: email }
        otp: { type: string, minLength: 6, maxLength: 6 }

    VerifyOtpDto:
      type: object
      required: [otp]
      properties:
        otp: { type: string, minLength: 6, maxLength: 6 }

    # ---- Brand DTOs ----
    CreateBrandDto:
      type: object
      required: [name, categoryIds]
      properties:
        name: { type: string, minLength: 2, maxLength: 64 }
        categoryIds:
          type: array
          items: { type: string }
          minItems: 1
        description: { type: string, maxLength: 1024 }

    UpdateBrandDto:
      type: object
      properties:
        name: { type: string, minLength: 2, maxLength: 64 }
        categoryIds:
          type: array
          items: { type: string }
        description: { type: string, maxLength: 1024 }

    # ---- Cart DTOs ----
    AddCartItemDto:
      type: object
      required: [productId, quantity]
      properties:
        productId: { type: string }
        quantity: { type: integer, minimum: 1 }

    UpdateCartItemDto:
      type: object
      required: [quantity]
      properties:
        quantity: { type: integer, minimum: 1 }

    # ---- Wishlist DTOs ----
    AddWishlistItemDto:
      type: object
      required: [productId]
      properties:
        productId: { type: string }

    # ---- Product DTOs ----
    CreateProductDto:
      type: object
      required: [name, price, categoryId, brandId]
      properties:
        name: { type: string, minLength: 2, maxLength: 128 }
        description: { type: string, maxLength: 2048 }
        price: { type: number, minimum: 0 }
        discountPercent: { type: number, minimum: 0, maximum: 100 }
        stock: { type: number, minimum: 0 }
        categoryId: { type: string }
        brandId: { type: string }

    UpdateProductDto:
      type: object
      description: Same as CreateProductDto minus `stock` (use the /stock endpoint instead)
      properties:
        name: { type: string, minLength: 2, maxLength: 128 }
        description: { type: string, maxLength: 2048 }
        price: { type: number, minimum: 0 }
        discountPercent: { type: number, minimum: 0, maximum: 100 }
        categoryId: { type: string }
        brandId: { type: string }

    AdjustStockDto:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          description: Positive or negative delta applied to current stock

    # ---- Coupon DTOs ----
    CreateCouponDto:
      type: object
      required: [code, discountType, discountValue, expiresAt, usageLimit]
      properties:
        code: { type: string }
        discountType: { $ref: "#/components/schemas/DISCOUNT_TYPE" }
        discountValue: { type: number, minimum: 0 }
        expiresAt: { type: string, format: date-time }
        usageLimit: { type: number, minimum: 1 }

    UpdateCouponDto:
      type: object
      properties:
        code: { type: string }
        discountType: { $ref: "#/components/schemas/DISCOUNT_TYPE" }
        discountValue: { type: number, minimum: 0 }
        expiresAt: { type: string, format: date-time }
        usageLimit: { type: number, minimum: 1 }

    ValidateCouponDto:
      type: object
      required: [code]
      properties:
        code: { type: string }

    # ---- Order DTOs ----
    CheckoutDto:
      type: object
      properties:
        couponCode: { type: string }
        provider: { $ref: "#/components/schemas/PAYMENT_PROVIDER" }

    UpdateOrderStatusDto:
      type: object
      required: [status]
      properties:
        status: { $ref: "#/components/schemas/ORDER_STATUS" }

    # ---- Review DTOs ----
    CreateReviewDto:
      type: object
      required: [orderId, rating]
      properties:
        orderId: { type: string }
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string, maxLength: 1024 }

    UpdateReviewDto:
      type: object
      properties:
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string, maxLength: 1024 }

    # ---- User DTOs ----
    UpdateProfileDto:
      type: object
      properties:
        firstName: { type: string, minLength: 3, maxLength: 16 }
        lastName: { type: string, minLength: 3, maxLength: 16 }
        phoneNumber: { type: string }

    ChangePasswordDto:
      type: object
      required: [oldPassword, newPassword]
      properties:
        oldPassword: { type: string }
        newPassword:
          type: string
          minLength: 8
          description: Must differ from oldPassword; at least 1 number, 1 symbol, 1 uppercase letter

    AddAddressDto:
      type: object
      required: [city, country]
      properties:
        city: { type: string }
        country: { type: string }
        isDefault: { type: boolean }

    UpdateAddressDto:
      type: object
      properties:
        city: { type: string }
        country: { type: string }
        isDefault: { type: boolean }

    AddPaymentMethodDto:
      type: object
      required: [method, last4]
      properties:
        method: { $ref: "#/components/schemas/PAYMENT_METHOD" }
        last4: { type: integer, minimum: 1000, maximum: 9999 }
        isDefault: { type: boolean }

    BanUserDto:
      type: object
      required: [banReason]
      properties:
        banReason: { type: string, minLength: 5 }

    LogoutDto:
      type: object
      required: [type]
      properties:
        type: { $ref: "#/components/schemas/LOGOUT_TYPE" }
