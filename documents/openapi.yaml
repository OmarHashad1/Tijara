openapi: 3.0.3
info:
  title: Tijara API
  description: >
    REST API for Tijara, an e-commerce backend built with NestJS.
    A separate GraphQL API also exists for the Category module at
    POST /graphql (schema in src/schema.gql) and is not documented here.
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: App
  - name: Auth
  - name: User - Customer
  - name: User - Admin
  - name: Brand - Guest
  - name: Brand - Admin
  - name: Category - Guest
  - name: Cart
  - name: Wishlist
  - name: Product - Guest
  - name: Product - Admin
  - name: Coupon - Customer
  - name: Coupon - Admin
  - name: Order - Customer
  - name: Order - Admin
  - name: Review - Guest
  - name: Review - Customer
  - name: Review - Admin

security: []

paths:
  /:
    get:
      tags: [App]
      operationId: appHeartbeat
      summary: Liveness heartbeat (cached 10s)
      responses:
        "200":
          description: Current server timestamp
          content:
            application/json:
              schema:
                type: integer
                example: 1752268800000

  # ---------------- Auth ----------------
  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Log in and receive accessToken/refreshToken cookies
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginDto" }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /auth/signup:
    post:
      tags: [Auth]
      operationId: signup
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SignupDto" }
      responses:
        "201": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409":
          description: Email already registered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/refresh-token:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Issue a new access token cookie from a valid refresh token cookie
      security: [{ refreshCookieAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/send-verify-email:
    post:
      tags: [Auth]
      operationId: sendVerifyEmail
      summary: Send an email-verification OTP to the logged-in user
      security: [{ cookieAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "400":
          description: Email already verified
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/check-verify-email:
    post:
      tags: [Auth]
      operationId: checkVerifyEmail
      summary: Verify the email OTP
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VerifyOtpDto" }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/send-forgot-password-otp:
    post:
      tags: [Auth]
      operationId: sendForgotPasswordOtp
      summary: Send a password-reset OTP to an email
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ForgotPasswordOtp" }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }

  /auth/verify-forgot-password-otp:
    post:
      tags: [Auth]
      operationId: verifyForgotPasswordOtp
      summary: Verify a forgot-password OTP
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VerifyForgotPasswordOtp" }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /auth/reset-password:
    patch:
      tags: [Auth]
      operationId: resetPassword
      summary: Reset password after OTP verification
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ForgotPassword" }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }

  # ---------------- User - Customer ----------------
  /user/me:
    get:
      tags: [User - Customer]
      operationId: getProfile
      summary: Get current user's profile
      security: [{ cookieAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/MessageDataOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      tags: [User - Customer]
      operationId: updateProfile
      summary: Update current user's profile
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateProfileDto" }
      responses:
        "200": { $ref: "#/components/responses/MessageDataOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      tags: [User - Customer]
      operationId: deleteOwnAccount
      summary: Delete own account
      security: [{ cookieAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /user/me/password:
    patch:
      tags: [User - Customer]
      operationId: changePassword
      summary: Change current user's password
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChangePasswordDto" }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /user/me/addresses:
    get:
      tags: [User - Customer]
      operationId: listAddresses
      summary: List current user's addresses
      security: [{ cookieAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/MessageDataOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [User - Customer]
      operationId: addAddress
      summary: Add an address
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddAddressDto" }
      responses:
        "201": { $ref: "#/components/responses/MessageDataOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /user/me/addresses/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
        description: Not ObjectId-validated by a pipe (raw string param)
    patch:
      tags: [User - Customer]
      operationId: updateAddress
      summary: Update an address
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateAddressDto" }
      responses:
        "200": { $ref: "#/components/responses/MessageDataOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [User - Customer]
      operationId: deleteAddress
      summary: Delete an address
      security: [{ cookieAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /user/me/payment-methods:
    get:
      tags: [User - Customer]
      operationId: listPaymentMethods
      summary: List current user's saved payment methods
      security: [{ cookieAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/MessageDataOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [User - Customer]
      operationId: addPaymentMethod
      summary: Add a payment method
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddPaymentMethodDto" }
      responses:
        "201": { $ref: "#/components/responses/MessageDataOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /user/me/payment-methods/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
        description: Not ObjectId-validated by a pipe (raw string param)
    delete:
      tags: [User - Customer]
      operationId: removePaymentMethod
      summary: Remove a payment method
      security: [{ cookieAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /user/logout:
    post:
      tags: [User - Customer]
      operationId: logout
      summary: Log out (single device or all). Allowed for USER and ADMIN; email verification not required.
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LogoutDto" }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ---------------- User - Admin ----------------
  /admin/users:
    get:
      tags: [User - Admin]
      operationId: adminListUsers
      summary: List users (search/status/role filters, paginated)
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { $ref: "#/components/schemas/USER_STATUS" } }
        - { name: role, in: query, schema: { $ref: "#/components/schemas/ROLE" } }
        - { name: page, in: query, schema: { type: integer, minimum: 1 } }
        - { name: size, in: query, schema: { type: integer, minimum: 1 } }
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema: { type: array, items: { type: object } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /admin/users/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [User - Admin]
      operationId: adminGetUser
      summary: Get a user by id
      security: [{ cookieAuth: [] }]
      responses:
        "200":
          description: User
          content:
            application/json:
              schema: { type: object }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [User - Admin]
      operationId: adminSoftDeleteUser
      summary: Soft-delete a user
      security: [{ cookieAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /admin/users/{id}/ban:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    patch:
      tags: [User - Admin]
      operationId: adminBanUser
      summary: Ban a user
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BanUserDto" }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /admin/users/{id}/unban:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    patch:
      tags: [User - Admin]
      operationId: adminUnbanUser
      summary: Unban a user
      security: [{ cookieAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /admin/users/{id}/hard:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    delete:
      tags: [User - Admin]
      operationId: adminHardDeleteUser
      summary: Permanently delete a user
      security: [{ cookieAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /admin/users/{id}/restore:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    patch:
      tags: [User - Admin]
      operationId: adminRestoreUser
      summary: Restore a soft-deleted user
      security: [{ cookieAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ---------------- Brand - Guest ----------------
  /brands:
    get:
      tags: [Brand - Guest]
      operationId: listBrands
      summary: List all brands
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }

  /brands/{slug}:
    get:
      tags: [Brand - Guest]
      operationId: getSingleBrand
      summary: Get a brand by slug
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ---------------- Brand - Admin ----------------
  /admin/brands:
    post:
      tags: [Brand - Admin]
      operationId: createBrand
      summary: Create a brand (optional logo upload)
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              allOf:
                - $ref: "#/components/schemas/CreateBrandDto"
                - type: object
                  properties:
                    logo:
                      type: string
                      format: binary
                      description: image/png, image/jpeg, image/webp, max 2MB
      responses:
        "201": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /admin/brands/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    patch:
      tags: [Brand - Admin]
      operationId: updateBrand
      summary: Update a brand (optional logo replace)
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              allOf:
                - $ref: "#/components/schemas/UpdateBrandDto"
                - type: object
                  properties:
                    logo:
                      type: string
                      format: binary
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Brand - Admin]
      operationId: deleteBrand
      summary: Delete a brand
      security: [{ cookieAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ---------------- Category - Guest ----------------
  /categories/{id}/brands:
    get:
      tags: [Category - Guest]
      operationId: listCategoryBrands
      summary: List brands belonging to a category
      description: >
        Only remaining REST route for Category. List/get/create/update/delete
        are implemented via GraphQL (query categories, query category, mutation
        createCategory/updateCategory/deleteCategory) — see src/schema.gql.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ---------------- Cart ----------------
  /cart:
    get:
      tags: [Cart]
      operationId: getCart
      summary: Get current user's cart
      security: [{ cookieAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      tags: [Cart]
      operationId: clearCart
      summary: Clear the entire cart
      security: [{ cookieAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /cart/items:
    post:
      tags: [Cart]
      operationId: addCartItem
      summary: Add an item to the cart
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddCartItemDto" }
      responses:
        "201": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /cart/items/{productId}:
    parameters:
      - { name: productId, in: path, required: true, schema: { type: string } }
    patch:
      tags: [Cart]
      operationId: updateCartItem
      summary: Update quantity of a cart item
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCartItemDto" }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Cart]
      operationId: removeCartItem
      summary: Remove an item from the cart
      security: [{ cookieAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ---------------- Wishlist ----------------
  /wishlist:
    get:
      tags: [Wishlist]
      operationId: getWishlist
      summary: Get current user's wishlist
      security: [{ cookieAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /wishlist/items:
    post:
      tags: [Wishlist]
      operationId: addWishlistItem
      summary: Add a product to the wishlist
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddWishlistItemDto" }
      responses:
        "201": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /wishlist/items/{productId}:
    delete:
      tags: [Wishlist]
      operationId: removeWishlistItem
      summary: Remove a product from the wishlist
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: productId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ---------------- Product - Guest ----------------
  /products:
    get:
      tags: [Product - Guest]
      operationId: listProducts
      summary: List products with filters/pagination (cached 20s)
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: categoryId, in: query, schema: { type: string } }
        - { name: brandId, in: query, schema: { type: string } }
        - { name: minPrice, in: query, schema: { type: number, minimum: 0 } }
        - { name: maxPrice, in: query, schema: { type: number, minimum: 0 } }
        - { name: page, in: query, schema: { type: integer, minimum: 1 } }
        - { name: size, in: query, schema: { type: integer, minimum: 1 } }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }

  /products/{slug}:
    get:
      tags: [Product - Guest]
      operationId: getSingleProduct
      summary: Get a product by slug
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ---------------- Product - Admin ----------------
  /admin/products:
    post:
      tags: [Product - Admin]
      operationId: createProduct
      summary: Create a product (up to 10 images)
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              allOf:
                - $ref: "#/components/schemas/CreateProductDto"
                - type: object
                  properties:
                    images:
                      type: array
                      maxItems: 10
                      items: { type: string, format: binary }
                      description: image/png, image/jpeg, image/webp, max 5MB each
      responses:
        "201": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /admin/products/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    patch:
      tags: [Product - Admin]
      operationId: updateProduct
      summary: Update a product (optional image replace)
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              allOf:
                - $ref: "#/components/schemas/UpdateProductDto"
                - type: object
                  properties:
                    images:
                      type: array
                      maxItems: 10
                      items: { type: string, format: binary }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Product - Admin]
      operationId: deleteProduct
      summary: Delete a product
      security: [{ cookieAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /admin/products/{id}/stock:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    patch:
      tags: [Product - Admin]
      operationId: adjustProductStock
      summary: Adjust stock quantity (positive or negative delta)
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdjustStockDto" }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ---------------- Coupon - Customer ----------------
  /coupons/validate:
